<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#C9A84C"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ATHLÈTE"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>ATHLÈTE v6</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --gold:#C9A84C;--gold-l:#E8D08A;--gold-d:#9A7828;
  --bg:#080808;--bg2:#0F0F0F;--bg3:#161616;--bg4:#1C1C1C;
  --card:#121212;--card2:#181818;
  --border:#1E1E1E;--border2:#272727;--border3:#303030;
  --text:#F2EDE5;--text2:#A8A09A;--text3:#5C5650;--text4:#3A3430;
  --red:#E05252;--green:#52B788;--blue:#5B9BD5;--purple:#9B72CF;--orange:#E8924C;--teal:#4ECDC4;
  --r:14px;--r2:9px;--r3:6px;
  --hh:58px;--nh:56px;
}
html,body{background:var(--bg);color:var(--text);height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.4}
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:opacity .5s .1s}
#splash.out{opacity:0;pointer-events:none}
.sp-word{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;letter-spacing:4px;color:var(--gold);line-height:1}
.sp-v{font-size:9px;letter-spacing:5px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.sp-bar{width:40px;height:1px;background:var(--border3);margin-top:18px;position:relative;overflow:hidden}
.sp-bar::after{content:'';position:absolute;inset:0;background:var(--gold);animation:spfill 1.1s ease forwards}
@keyframes spfill{0%{transform:scaleX(0);transform-origin:left}100%{transform:scaleX(1)}}
/* HEADER */
.hdr{height:var(--hh);padding:0 14px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.hdr-left{display:flex;flex-direction:column}
.hdr-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:1.5px;color:var(--text);line-height:1}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:7px}
.badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.b-train{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.b-rest{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.b-deload{background:rgba(232,146,76,.1);color:var(--orange);border:1px solid rgba(232,146,76,.2)}
.b-normal{background:rgba(82,183,136,.1);color:var(--green);border:1px solid rgba(82,183,136,.2)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}.sync-dot.syncing{background:var(--gold);animation:bl .7s infinite}.sync-dot.off{background:var(--border3)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;flex-shrink:0}
.icon-btn.active{border-color:var(--green);background:rgba(82,183,136,.08)}
/* NAV */
.nav{height:var(--nh);display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;letter-spacing:.3px;position:relative;padding:4px 2px;transition:color .15s}
.nb.on{color:var(--gold)}
.nb.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--gold);border-radius:0 0 3px 3px}
.ni{font-size:18px;line-height:1.1}
/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 14px 20px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px;position:relative;overflow:hidden}
.card-gold::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
.card-green::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent)}
.sec{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin:13px 0 7px;font-weight:600}
.sec:first-child{margin-top:0}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
/* ALERTS */
.alert{border-radius:var(--r2);padding:10px 12px;margin-bottom:9px;display:flex;gap:9px;align-items:flex-start;font-size:12px;line-height:1.6}
.alert strong{display:block;margin-bottom:2px;font-weight:600}
.a-red{background:rgba(224,82,82,.07);border:1px solid rgba(224,82,82,.18);color:var(--red)}
.a-gold{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);color:var(--gold)}
.a-green{background:rgba(82,183,136,.07);border:1px solid rgba(82,183,136,.18);color:var(--green)}
.a-blue{background:rgba(91,155,213,.07);border:1px solid rgba(91,155,213,.18);color:var(--blue)}
.a-orange{background:rgba(232,146,76,.07);border:1px solid rgba(232,146,76,.18);color:var(--orange)}
.a-purple{background:rgba(155,114,207,.07);border:1px solid rgba(155,114,207,.18);color:var(--purple)}
/* FTOUR */
.ftour-card{background:linear-gradient(135deg,#140F00 0%,var(--card) 65%);border:1px solid rgba(201,168,76,.15);border-radius:var(--r);padding:16px;margin-bottom:9px;text-align:center;position:relative;overflow:hidden}
.ftour-card::after{content:'';position:absolute;top:-50px;right:-50px;width:130px;height:130px;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%)}
.ftour-label{font-size:9px;letter-spacing:3px;color:var(--gold);opacity:.65;text-transform:uppercase;margin-bottom:5px}
.ftour-time{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;line-height:1;color:var(--text)}
.ftour-time.soon{color:var(--red);animation:blink .8s infinite}
.ftour-time.done{color:var(--green)}
.ftour-sub{font-size:11px;color:var(--text3);margin-top:5px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:11px}
.kpi-l{font-size:10px;color:var(--text3);margin-bottom:3px}
.kpi-v{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.kpi-s{font-size:10px;color:var(--text3);margin-top:2px}
.pbar{background:var(--bg3);border-radius:99px;height:3px;margin-top:6px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .6s cubic-bezier(.22,1,.36,1)}
/* MUSCLE FATIGUE */
.mg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.mg-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:8px 10px}
.mg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mg-name{font-size:10px;font-weight:600;color:var(--text2)}
.mg-score{font-size:9px}
.mg-track{background:var(--bg2);border-radius:99px;height:4px;overflow:hidden}
.mg-fill{height:100%;border-radius:99px;transition:width .5s ease}
/* RECOVERY */
.rec-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.rec-lbl{font-size:11px;color:var(--text2);width:85px;flex-shrink:0}
.rdot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .15s}
.rcol-1{--rc:#E05252}.rcol-2{--rc:#E8924C}.rcol-3{--rc:#E8D08A}.rcol-4{--rc:#52B788}.rcol-5{--rc:#5B9BD5}
/* WEEK */
.wstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:9px}
.wd{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 2px;text-align:center;cursor:pointer;transition:all .15s}
.wd.today{border-color:rgba(201,168,76,.4)}
.wd.done{background:rgba(201,168,76,.07);border-color:rgba(201,168,76,.22)}
.wd.restday{opacity:.28}
.wd-l{font-size:7px;color:var(--text3);margin-bottom:3px;letter-spacing:.3px}
.wd-dot{width:5px;height:5px;border-radius:50%;background:var(--border3);margin:0 auto}
.wd.done .wd-dot,.wd.today .wd-dot{background:var(--gold)}
/* HYDRATION */
.glasses{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.glass{width:28px;height:35px;border:1.5px solid var(--border2);border-radius:3px 3px 5px 5px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.glass.on{border-color:rgba(91,155,213,.5)}
.gw{position:absolute;bottom:0;left:0;right:0;background:rgba(91,155,213,.25);transition:height .3s}
.glass.on .gw{height:100%}
.hydro-btns{display:flex;gap:6px;margin-top:5px}
.hbtn{flex:1;padding:7px;border:1px solid var(--border2);border-radius:var(--r2);background:none;color:var(--text3);font-size:14px;cursor:pointer}
/* SUPPS */
.spills{display:flex;gap:6px;flex-wrap:wrap}
.spill{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s}
.spill.on{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.28);color:var(--gold)}
/* SEARCH */
.s-wrap{position:relative;margin-bottom:7px}
.s-inp{width:100%;padding:12px 40px 12px 38px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.s-inp:focus{border-color:var(--gold)}
.s-inp::placeholder{color:var(--text3)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px}
.suggs{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);overflow:hidden;margin-top:-4px;margin-bottom:7px}
.sug{padding:10px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background .1s}
.sug:last-child{border-bottom:none}
.sug:active{background:var(--bg2)}
.sug-n{font-size:13px;color:var(--text)}.sug-m{font-size:10px;color:var(--text3);margin-top:1px}
.sug-c{font-family:'Syne',sans-serif;font-size:14px;color:var(--gold);font-weight:700;flex-shrink:0}
.tag{font-size:8px;padding:2px 5px;border-radius:20px;margin-left:4px;display:inline-block;vertical-align:middle}
.tag-db{background:rgba(82,183,136,.1);color:var(--green)}
.tag-ai{background:rgba(201,168,76,.1);color:var(--gold)}
.tag-off{background:rgba(91,155,213,.1);color:var(--blue)}
.cat-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:8px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.ctab{padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ctab.on{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.28);color:var(--gold)}
/* RESULT */
.rcard{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:13px;margin-bottom:9px}
.rcard-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px}
.qty-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.qty-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qty-in{width:72px;text-align:center;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:'Syne',sans-serif;font-size:20px;font-weight:800;padding:6px;outline:none;-moz-appearance:textfield}
.qty-in::-webkit-outer-spin-button,.qty-in::-webkit-inner-spin-button{-webkit-appearance:none}
.qty-in:focus{border-color:var(--gold)}
.qty-kcal{font-family:'Syne',sans-serif;font-size:20px;color:var(--gold);font-weight:800;margin-left:auto}
.macs{display:flex;gap:6px;margin-bottom:10px}
.mac{flex:1;text-align:center;background:var(--bg2);border-radius:var(--r2);padding:7px 4px}
.mac-v{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.mac-l{font-size:9px;color:var(--text3);margin-top:1px;letter-spacing:.5px;text-transform:uppercase}
.add-btn{width:100%;padding:12px;border-radius:var(--r2);border:none;background:var(--gold);color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.add-btn:active{opacity:.75}
/* FOOD LOG */
.fi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
.fi-n{font-size:13px;color:var(--text)}.fi-m{font-size:10px;color:var(--text3);margin-top:1px}
.fi-c{font-family:'Syne',sans-serif;font-size:14px;color:var(--gold);font-weight:700;flex-shrink:0}
.fi-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:3px 5px;margin-left:3px}
/* DATE NAV */
.datenav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:9px 13px;margin-bottom:9px}
.datenav-btn{background:none;border:1px solid var(--border2);border-radius:var(--r3);padding:4px 10px;color:var(--text2);font-size:13px;cursor:pointer}
.datenav-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
/* BARCODE */
.barcode-row{display:flex;gap:7px;margin-bottom:7px}
.bc-inp{flex:1;padding:11px 12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:'Syne',sans-serif;font-size:16px;font-weight:700;outline:none;-moz-appearance:textfield}
.bc-inp::-webkit-outer-spin-button,.bc-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.bc-inp:focus{border-color:var(--blue)}
.bc-inp::placeholder{font-family:'DM Sans',sans-serif;font-weight:400;font-size:13px}
.bc-btn{padding:11px 14px;border-radius:var(--r2);border:1.5px solid rgba(91,155,213,.3);background:rgba(91,155,213,.06);color:var(--blue);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
/* MEAL PRESETS */
.mp{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.mp:active{border-color:var(--gold)}
.mp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mp-name{font-size:13px;font-weight:600;color:var(--text)}
.mp-kcal{font-family:'Syne',sans-serif;font-size:14px;color:var(--gold);font-weight:700}
.mp-items{font-size:11px;color:var(--text3);line-height:1.5}
.mp-load{font-size:9px;color:var(--gold);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.mp-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:3px 6px}
/* RING */
.ring-wrap{display:flex;justify-content:center;margin-bottom:13px;position:relative}
.ring-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
/* TRAINING */
.dtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.dtab{padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.dtab.on{background:rgba(201,168,76,.09);border-color:rgba(201,168,76,.32);color:var(--gold)}
.excard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;overflow:hidden;transition:border-color .2s}
.excard.done{border-color:rgba(201,168,76,.18)}
.excard.injured{border-color:rgba(224,82,82,.25);opacity:.7}
.exhead{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;cursor:pointer}
.exnum{font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:1px}
.exname{font-size:13px;font-weight:500;color:var(--text)}
.exmeta{font-size:10px;color:var(--text3);margin-top:2px}
.exchk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;flex-shrink:0;transition:all .2s}
.excard.done .exchk{background:var(--gold);border-color:var(--gold);color:#000}
.exbody{padding:0 13px 12px;border-top:1px solid var(--border)}
.next-load{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);border-bottom:none;padding:9px 13px;display:flex;justify-content:space-between;align-items:center}
.nl-l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.nl-v{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--gold)}
.nl-s{font-size:10px;color:var(--text3)}
.plateau-warn{background:rgba(224,82,82,.05);border:1px solid rgba(224,82,82,.18);border-bottom:none;padding:9px 13px}
.plat-t{font-size:10px;color:var(--red);font-weight:600;margin-bottom:3px}
.variant-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.vpill{padding:4px 9px;border-radius:20px;border:1px solid rgba(224,82,82,.25);background:rgba(224,82,82,.06);color:var(--red);font-size:10px;cursor:pointer}
/* INJURY FLAGS */
.inj-row{display:flex;gap:5px;align-items:center;padding:7px 13px;border-top:1px solid var(--border);flex-wrap:wrap}
.inj-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;margin-right:3px}
.inj-opt{padding:3px 9px;border-radius:20px;border:1px solid var(--border2);font-size:9px;cursor:pointer;transition:all .15s}
.inj-ok{color:var(--green);border-color:rgba(82,183,136,.25)}
.inj-ok.sel{background:rgba(82,183,136,.1)}
.inj-warn{color:var(--orange);border-color:rgba(232,146,76,.25)}
.inj-warn.sel{background:rgba(232,146,76,.1)}
.inj-pain{color:var(--red);border-color:rgba(224,82,82,.25)}
.inj-pain.sel{background:rgba(224,82,82,.1)}
/* WARMUP */
.warmup-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid rgba(91,155,213,.22);background:none;color:var(--blue);font-size:10px;cursor:pointer;margin-top:6px}
.wu-section{background:rgba(91,155,213,.04);border-top:1px solid rgba(91,155,213,.12);padding:10px 13px}
.wu-sets{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.wu-set{background:var(--bg2);border:1px solid rgba(91,155,213,.18);border-radius:var(--r2);padding:6px 9px;text-align:center}

const calc1RM=(w,r)=>{if(r<=1)return w;return r<=10?Math.round(w*(1+r/30)):Math.round(w*36/(37-r))};// Epley ≤10, Brzycki >10
const playBeep=()=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();[[880,0],[1100,.12],[880,.3],[1100,.42],[1320,.6]].forEach(([f,d])=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.setValueAtTime(.45,a.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d+.18);o.start(a.currentTime+d);o.stop(a.currentTime+d+.2)})}catch{}};
const genDeviceId=()=>{let id=S.get("device_id");if(!id){id=Math.random().toString(36).slice(2)+Date.now().toString(36);S.set("device_id",id)}return id};
function showToast(msg,type=""){const t=document.getElementById("toast");t.textContent=msg;t.className=`toast show ${type}`;clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove("show"),2800)}

function createSupaSync(cfg,deviceId){
  if(!cfg?.url||!cfg?.key)return{push:()=>{},pull:async()=>{}};
  const base=cfg.url.replace(/\/$/,"");
  const headers={"Content-Type":"application/json","apikey":cfg.key,"Authorization":`Bearer ${cfg.key}`,"Prefer":"resolution=merge-duplicates"};
  return{
    push:async(key,value)=>{try{await fetch(`${base}/rest/v1/athlete_sync`,{method:"POST",headers,body:JSON.stringify({device_id:deviceId,key,value:JSON.stringify(value),updated_at:new Date().toISOString()})})}catch{}},
    pull:async()=>{try{const r=await fetch(`${base}/rest/v1/athlete_sync?device_id=eq.${deviceId}&select=key,value`,{headers:{...headers,Prefer:""}});const data=await r.json();if(Array.isArray(data))data.forEach(({key,value})=>{try{localStorage.setItem("a6_"+key,value)}catch{}});return data?.length||0}catch{return 0}}
  };
}

function CalRing({val,max}){
  const pct=Math.min(1,val/(max||1)),r=56,C=2*Math.PI*r;
  const col=pct>=1?"#E05252":pct>=.85?"#E8924C":"#C9A84C";
  return(<div className="ring-wrap"><svg width="124" height="124" viewBox="0 0 124 124">
    <circle cx="62" cy="62" r={r} fill="none" stroke="#1A1A1A" strokeWidth="7"/>
    <circle cx="62" cy="62" r={r} fill="none" stroke={col} strokeWidth="7"
      strokeDasharray={`${pct*C} ${C}`} strokeLinecap="round"
      transform="rotate(-90 62 62)" style={{transition:"stroke-dasharray .65s ease"}}/>
  </svg>
  <div className="ring-ctr">
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,lineHeight:1}}>{val}</div>
    <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>/ {max} kcal</div>
    <div style={{fontSize:11,color:col,marginTop:2,fontWeight:700}}>{Math.round(pct*100)}%</div>
  </div></div>);
}

function LineChart({data,color,label,unit=""}){
  if(!data||data.length<2)return(<div className="chart-card"><div className="chart-t">{label}</div><div className="empty">Continue à enregistrer — données insuffisantes</div></div>);
  const W=270,H=46,vals=data.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),range=(mx-mn)||1;
  const px=i=>(i/(vals.length-1))*W,py=v=>H-((v-mn)/range)*H*.9+H*.05;
  const pts=vals.map((v,i)=>`${px(i)},${py(v)}`).join(" ");
  const area=`M${px(0)},${H} `+vals.map((v,i)=>`L${px(i)},${py(v)}`).join(" ")+` L${px(vals.length-1)},${H} Z`;
  const gid=label.replace(/\W/g,"").slice(0,6);
  return(<div className="chart-card">
    <div className="chart-t">{label}</div>
    <svg width="100%" viewBox={`0 0 ${W} ${H+12}`} style={{overflow:"visible"}}>
      <defs><linearGradient id={`cg${gid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".18"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#cg${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>
      {vals.map((v,i)=><circle key={i} cx={px(i)} cy={py(v)} r="2.5" fill={color}/>)}
      {[0,vals.length-1].map(i=><text key={i} x={px(i)} y={H+11} textAnchor={i===0?"start":"end"} fill="var(--text3)" fontSize="8" fontFamily="DM Sans">{data[i].l}</text>)}
    </svg>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text3)",marginTop:3}}>
      <span>Min <span style={{color,fontWeight:600}}>{Math.min(...vals)}{unit}</span></span>
      <span>Moy <span style={{color,fontWeight:600}}>{Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}{unit}</span></span>
      <span>Max <span style={{color,fontWeight:600}}>{Math.max(...vals)}{unit}</span></span>
    </div>
  </div>);
}

        {t:"⚠️ L'IA se trompe ? On te prévient",d:"Quand tu cherches un aliment bizarre que l'app ne connaît pas, elle demande à l'IA. Mais parfois l'IA invente n'importe quoi (genre 900 calories pour du poulet). Maintenant, si les chiffres sont bizarres, un message rouge te dit 'Attention, vérifie ces valeurs'. Tu décides si tu ajoutes ou pas."},
        {t:"💾 Ton téléphone est presque plein ?",d:"L'app stocke tout sur ton téléphone (max 5MB). Dans Paramètres, une barre te montre combien de place il reste. Si c'est presque plein, elle te dit de faire un export pour ne rien perdre. C'est comme le petit voyant d'essence dans une voiture."},
        {t:"🔥 Attention tu t'entraînes trop !",d:"Si tu fais 6 séances en 7 jours, l'app te montre un message rouge. Tes muscles ont besoin de repos pour grandir. 4 séances par semaine c'est parfait. Plus que ça et ton corps fatigue au lieu de progresser. C'est comme arroser une plante trop souvent — ça noie au lieu d'aider."},
        {t:"🔄 Fatigué ? L'app s'adapte",d:"Si ton score du matin est bas (tu as mal dormi, tu es fatigué), et que c'est un jour de musculation, l'app te dit : 'Aujourd'hui, mets moins lourd et fais plus de répétitions.' Tu t'entraînes quand même, mais sans te blesser. C'est intelligent, pas fainéant."},
        {t:"🎯 RPE — à quel point c'était dur ?",d:"Après chaque exercice, tu peux dire à quel point c'était difficile de 6 à 10. 6 = facile, 10 = impossible d'en faire une de plus. L'app utilise ce chiffre pour savoir si tu dois monter en poids la prochaine fois ou rester au même poids. Si c'était RPE 9 (très dur), elle ne te dit pas de monter — elle te dit de consolider d'abord."},
        {t:"📝 Toutes tes notes au même endroit",d:"Quand tu écris 'genoux douloureux' après une séance jambes, tu peux retrouver cette note dans Stats → Notes. Tu vois aussi quels exercices tu as fait ce jour-là et à combien de kilos. La semaine suivante, avant de refaire les jambes, tu relis tes notes. C'est ton carnet d'entraînement."},
        {t:"📊 Exporter pour ton coach",d:"Tu peux envoyer un fichier CSV (comme Excel) à ton coach avec toutes tes données : dates, exercices, charges, répétitions, 1RM. Il ouvre ça dans Google Sheets et voit tout ton historique proprement. Plus besoin de lui envoyer des captures d'écran."},
        {t:"📥 Importer un backup",d:"Tu as exporté tes données en JSON et tu changes de téléphone ? Dans Stats → Export, il y a maintenant un bouton vert 'Importer un backup JSON'. Tu choisis le fichier, et toutes tes données reviennent. C'est comme brancher une clé USB avec tes souvenirs."},
        {t:"📋 Choisir quoi charger dans un repas sauvegardé",d:"Avant, quand tu chargeais un repas sauvegardé, tout arrivait d'un coup. Maintenant, l'app te montre la liste avec des cases à cocher. Pas de banane ce matin ? Décoche-la. Seuls les aliments cochés sont ajoutés. C'est comme commander un menu mais pouvoir retirer les trucs que tu veux pas."},
        {t:"🧬 L'app calcule l'effet du sommeil sur tes muscles",d:"Après 4 semaines de données, l'app compare automatiquement : les jours où tu dors plus de 7h, tu soulèves X kg en moyenne. Les jours où tu dors moins de 6h, tu soulèves Y kg. La différence est affichée en pourcentage. C'est la preuve que le sommeil fait la force — avec tes propres chiffres."},
      ]},
    ].map(({title,items})=><div key={title} style={{marginBottom:16}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,marginBottom:8,color:"var(--gold)"}}>{title}</div>
      {items.map(({t,d})=><div key={t} className="guide-item"><div className="gi-t">· {t}</div><div className="gi-d">{d}</div></div>)}
    </div>)}

    <div className="guide-tip"><strong>💡 Règle d'or pour un enfant de 6 ans</strong><br/>Mange beaucoup de poulet et d'œufs ({targets.p}g de protéines par jour). Dors beaucoup (7h minimum). Entraîne-toi 4 fois par semaine. Bois 8 verres d'eau entre le ftour et le s'hour. C'est tout. Le reste c'est du bonus.</div>
    <div className="guide-tip"><strong>💡 Tu changes de téléphone ?</strong><br/>Va dans Stats → Export → clique sur 💾 Backup JSON. Envoie-toi le fichier par email ou WhatsApp. Sur le nouveau téléphone, installe l'app, va dans Stats → Export → clique sur 📥 Importer. Ou alors active Supabase dans Paramètres et tout se synchronise automatiquement. Zéro perte.</div>
  </>;

  // ── MAIN RENDER ──
  const todayStr=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  const tabs={home:renderHome,nutrition:renderNutrition,training:renderTraining,stats:renderStats,plus:renderPlus};

  return(<>
    <div className="hdr">
      <div className="hdr-left">
        <div className="hdr-title">ATHLÈTE{isPostRamadan?" 🌅":""}</div>
        <div className="hdr-sub">{todayStr}</div>
      </div>
      <div className="hdr-right">
        {settings.supaUrl&&<div className={`sync-dot ${syncStatus}`}/>}
        <span className={`badge ${needsDeload?"b-deload":isDeloadWeek&&isTrain?"b-deload":isPostRamadan?"b-normal":isTrain?"b-train":"b-rest"}`}>
          {needsDeload?"⚠ DELOAD":isDeloadWeek&&isTrain?"DELOAD 🔄":isPostRamadan?"POST-RAMADAN":isTrain?TP_DEFAULT[today].tag:"REPOS"}
        </span>
        <button className={`icon-btn${notifOn?" active":""}`} onClick={async()=>{
          if(notifOn){setNotifOn(false);return}
          if(typeof Notification==="undefined"){showToast("Installe l'app d'abord");return}
          const p=await Notification.requestPermission();
          if(p==="granted"){setNotifOn(true);if(!isPostRamadan){window.schedFtour&&window.schedFtour(ftourTime);window.schedSuhoor&&window.schedSuhoor(settings.suhoorTime||"04:30")}showToast("Notifications activées ✓","g")}
          else showToast("Refusé → voir Guide","r");
        }}>{notifOn?"🔔":"🔕"}</button>
      </div>
    </div>

    <div className="content">{(tabs[tab]||renderHome)()}</div>

    <nav className="nav">
      {[{id:"home",icon:"⊞",l:"Accueil"},{id:"nutrition",icon:"🍽",l:"Nutrition"},{id:"training",icon:"🏋",l:"Training"},{id:"stats",icon:"📊",l:"Stats"},{id:"plus",icon:"···",l:"Plus"}].map(({id,icon,l})=><button key={id} className={`nb${tab===id?" on":""}`} onClick={()=>setTab(id)}>
        <span className="ni">{icon}</span>{l}
      </button>)}
    </nav>

    {timer&&!focusMode&&<div className="timer-float">
      <div className="timer-info">
        <div className="timer-name">{timer.name}</div>
        <div className={`timer-count${timer.sec<=10?" urgent":""}`}>{fmtTime(timer.sec)}</div>
      </div>
      <div className="timer-prog">
        <div className="timer-bar-bg"><div className="timer-bar-fill" style={{width:`${((timer.total-timer.sec)/timer.total)*100}%`}}/></div>
        <div className="timer-adj">
          <button className="timer-adj-btn" onClick={()=>adjTimer(-30)}>−30s</button>
          <button className="timer-adj-btn" onClick={()=>adjTimer(30)}>+30s</button>
        </div>
      </div>
      <button className="timer-skip" onClick={()=>{if(timerRef.current)clearInterval(timerRef.current);setTimer(null)}}>SKIP</button>
    </div>}
  </>);
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
